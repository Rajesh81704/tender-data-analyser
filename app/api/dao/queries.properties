# SQL Queries Properties File
# Format: query.name=SQL statement

query.health.check=SELECT 1 as status

query.tender.insert_tender_main=INSERT INTO tender_master (tndr_source_file, dst_source_file, dept_source_file, crt_dt, crt_user) VALUES (%s, %s, %s, %s, %s) RETURNING tndr_pk

query.tender.insert_tender_dtls=INSERT INTO "TENDER_DATA_DTLS" ("TDM_PK", "DISTRICT_CODE", "WORK_CODE", "DEPARTMENT_CODE", "PROJECT_NAME", "SANCTION_COST", "SANCTION_DATE", "FUND_RECEIVED", "FUND_RECEIVED_DATE", "LAND_RECEIVED_DATE", "WIP_PREVIOUS_YEAR", "WIP_CURRENT_YEAR", "WIP_CURRENT_MONTH", "WIP_TOTAL", "PHYSICAL_PROGRESS", "PHYSICAL_PROGRESS_REMARK") VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s)

query.tender.insert_district_dtls=INSERT INTO "DISTRICT_DETAILS" ("DIST_DTLS_PK", "DIST_CODE", "DIST_NAME", "ZONE") VALUES (%s, %s, %s, %s)

query.tender.insert_dept_dtls=INSERT INTO "DEPT_DTLS" ("DEPT_DTLS_PK", "SR_NO", "DEPT_NAME", "SUB_DEPT_NAME", "DEPT_SUB_DEPT_CODE") VALUES (%s, %s, %s, %s, %s)
